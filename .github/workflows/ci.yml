name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: cr.yandex/${{ secrets.YC_REGISTRY_ID }}
  IMAGE: guestbook
  TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: |
          set -x
          go vet -v ./...
          test -z "$(gofmt -l .)"
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: guestbook
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        env:
          DATABASE_URL: postgres://app:secret@localhost:5432/guestbook?sslmode=disable
        run: go test -v ./...

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yc CLI
        run: |
          curl https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate to Yandex Cloud
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" | tr -d '\r' > /tmp/sa-key.json
          cat /tmp/sa-key.json | jq . > /dev/null || { echo "Invalid JSON"; exit 1; }
          yc config set service-account-key /tmp/sa-key.json
          yc container registry configure-docker

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$IMAGE:$TAG -t $REGISTRY/$IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$IMAGE:$TAG
          docker push $REGISTRY/$IMAGE:latest

  update-gitops:
    name: Update GitOps repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout GitOps repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }}
        run: |
          REPO_CLEAN=${GITOPS_REPO#https://}
          echo "Клонируем репозиторий: https://oauth2:${GITOPS_TOKEN}@${REPO_CLEAN}"
          git clone --branch main https://oauth2:${GITOPS_TOKEN}@${REPO_CLEAN} /tmp/gitops
          echo "=== Содержимое /tmp/gitops ==="
          ls -la /tmp/gitops
          echo "=== Папка values/guestbook ==="
          ls -la /tmp/gitops/values/guestbook/ || echo "Папка не найдена"
          echo "=== Поиск prod.yaml ==="
          find /tmp/gitops -name "prod.yaml"

      - name: Install yq
        run: |
          sudo snap install yq

      - name: Bump image tag in prod.yaml
        env:
          TAG: ${{ github.sha }}
        run: |
          cd /tmp/gitops
          yq eval -i ".image.tag = \"$TAG\"" values/guestbook/prod.yaml

      - name: Commit and push
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }}
        run: |
          REPO_CLEAN=${GITOPS_REPO#https://}
          cd /tmp/gitops
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"
          git add values/guestbook/prod.yaml
          git commit -m "Bump guestbook to ${{ github.sha }} [skip ci]" || echo "No changes"
          git push https://oauth2:${GITOPS_TOKEN}@${REPO_CLEAN} main
